name: Keep-alive & matchmaking

# Two jobs in one daily cron:
#  1. Ping /api/health so Supabase's free tier doesn't pause between Ekadashis
#     (it pauses after ~7 days idle; Ekadashi is only ~twice a month).
#  2. Ping /api/cron/matchmaking so each Ekadashi's pairings get generated
#     ~1 day before, even if nobody opens the site.
# Set the APP_URL repository variable to your deployed URL
# (e.g. https://your-app.vercel.app). If you set a CRON_SECRET env var on the
# host, also add a CRON_SECRET repository secret here.

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.APP_URL }}"
          if [ -z "$URL" ]; then
            echo "Set the APP_URL repository variable to your deployed URL."
            exit 0
          fi
          echo "Pinging $URL/api/health"
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" "$URL/api/health") || true
          cat /tmp/out.json || true
          echo ""
          echo "HTTP $code"
          if [ "$code" != "200" ]; then exit 1; fi

      - name: Trigger matchmaking
        run: |
          URL="${{ vars.APP_URL }}"
          if [ -z "$URL" ]; then exit 0; fi
          KEY="${{ secrets.CRON_SECRET }}"
          echo "Pinging $URL/api/cron/matchmaking"
          code=$(curl -s -o /tmp/mm.json -w "%{http_code}" "$URL/api/cron/matchmaking?key=$KEY") || true
          cat /tmp/mm.json || true
          echo ""
          echo "HTTP $code"
