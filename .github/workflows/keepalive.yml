name: Supabase keep-alive

# Supabase's free tier pauses a project after ~7 days of inactivity, and
# Ekadashi is only ~twice a month. This pings the deployed health endpoint
# daily so the database stays awake. Set the APP_URL repo variable to your
# deployed URL (e.g. https://your-app.vercel.app).

on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.APP_URL }}"
          if [ -z "$URL" ]; then
            echo "Set the APP_URL repository variable to your deployed URL."
            exit 0
          fi
          echo "Pinging $URL/api/health"
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" "$URL/api/health") || true
          cat /tmp/out.json || true
          echo ""
          echo "HTTP $code"
          if [ "$code" != "200" ]; then exit 1; fi
